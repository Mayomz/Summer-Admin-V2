<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>คลังงาน | FiveM Ticket Desk</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="archive">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-mark">FT</span><span><strong>FiveM Ticket</strong><small>Admin Desk</small></span></a>
      <nav class="nav">
        <a href="dashboard.html" data-icon="dashboard">Dashboard</a>
        <a href="index.html" data-icon="ticket">จัดการ Ticket</a>
        <a href="admin.html" data-icon="shield">สิทธิ์ผู้ใช้</a>
        <a class="active" href="archive.html" data-icon="archive">คลังงาน</a>
        <a href="backend.html" data-icon="layers">หมวดหมู่</a>
        <a href="config.html" data-icon="database">ฐานข้อมูล</a>
        <a href="stats.html" data-icon="chart">สถิติ</a>
      </nav>
      <div class="connection-light" id="connectionLight" title="สถานะการเชื่อมต่อ"></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div><p class="eyebrow">Archive</p><h1>คลังเก็บข้อมูลงาน</h1></div>
        <div class="top-actions"><button class="ghost-button" data-logout>ออกจากระบบ</button><button class="danger-button" id="clearArchive">ลบคลังทั้งหมด</button></div>
      </header>
      <section class="workspace">
        <div class="toolbar">
          <div class="searchbox"><span></span><input type="search" id="archiveSearch" placeholder="ค้นหา Ticket ในคลัง"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>เลข TK</th><th>ผู้แจ้ง</th><th>หมวดหมู่</th><th>ความสำคัญ</th><th>ผลตัดสิน</th><th>ลิงก์</th><th></th></tr></thead>
            <tbody id="archiveRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/site-config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>

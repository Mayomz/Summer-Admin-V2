<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ | FiveM Ticket Desk</title>
  <link rel="stylesheet" href="assets/styles.css?v=20260617-evidence-clips">
</head>
<body data-page="login">
  <main class="login-screen">
    <section class="login-card">
      <a class="brand dark" href="login.html">
        <span class="brand-mark">FT</span>
        <span>
          <strong>FiveM Ticket</strong>
          <small>Admin Desk</small>
        </span>
      </a>
      <div>
        <p class="eyebrow">Admin Login</p>
        <h1>เข้าสู่ระบบจัดการ Ticket</h1>
        <p class="muted">สำหรับแอดมินที่ดูแล Ticket ใน Discord ของเซิร์ฟเวอร์ FiveM</p>
      </div>
      <form class="login-form" id="loginPageForm">
        <label>ID
          <input type="text" id="loginUserId" placeholder="เช่น admin01" autocomplete="username" required>
        </label>
        <label>Pass
          <input type="password" id="loginPassword" placeholder="รหัสผ่าน" autocomplete="current-password" required>
        </label>
        <button class="primary-button" type="submit">เข้าสู่ระบบ</button>
        <p class="muted" id="loginMessage"></p>
      </form>
      <a class="ghost-button center-button" href="register.html">สมัครเข้าใช้งาน</a>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/site-config.js"></script>
  <script src="assets/app.js?v=20260617-evidence-clips"></script>
</body>
</html>

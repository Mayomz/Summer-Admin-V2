<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>หมวดหมู่ | FiveM Ticket Desk</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="backend">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-mark">FT</span><span><strong>FiveM Ticket</strong><small>Admin Desk</small></span></a>
      <nav class="nav">
        <a href="dashboard.html" data-icon="dashboard">Dashboard</a>
        <a href="index.html" data-icon="ticket">จัดการ Ticket</a>
        <a href="admin.html" data-icon="shield">สิทธิ์ผู้ใช้</a>
        <a href="archive.html" data-icon="archive">คลังงาน</a>
        <a class="active" href="backend.html" data-icon="layers">หมวดหมู่</a>
        <a href="config.html" data-icon="database">ฐานข้อมูล</a>
        <a href="stats.html" data-icon="chart">สถิติ</a>
      </nav>
      <div class="connection-light" id="connectionLight" title="สถานะการเชื่อมต่อ"></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div><p class="eyebrow">Backend Setup</p><h1>เพิ่มหมวดหมู่งาน</h1></div>
        <button class="ghost-button" data-logout>ออกจากระบบ</button>
      </header>
      <section class="workspace two-column">
        <form class="panel-form" id="categoryForm">
          <h2>หมวดหมู่ใหม่</h2>
          <label>ชื่อหมวดหมู่ <input id="categoryName" required placeholder="เช่น ใบแดง, เคสแก๊ง, บั๊กระบบ"></label>
          <label>สีแสดงผล <input id="categoryColor" type="color" value="#2563eb"></label>
          <button class="primary-button" type="submit">เพิ่มหมวดหมู่</button>
        </form>
        <div class="category-list" id="categoryList"></div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/site-config.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สิทธิ์ผู้ใช้ | FiveM Ticket Desk</title>
  <link rel="stylesheet" href="assets/styles.css?v=20260617-final-check">
</head>
<body data-page="admin">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-mark">FT</span><span><strong>FiveM Ticket</strong><small>Admin Desk</small></span></a>
      <nav class="nav">
        <a href="dashboard.html" data-icon="dashboard">Dashboard</a>
        <a href="index.html" data-icon="ticket">จัดการ Ticket</a>
        <a class="active" href="admin.html" data-icon="shield">สิทธิ์ผู้ใช้</a>
        <a href="archive.html" data-icon="archive">คลังงาน</a>
        <a href="backend.html" data-icon="layers">หมวดหมู่</a>
        <a href="config.html" data-icon="database">ฐานข้อมูล</a>
        <a href="stats.html" data-icon="chart">สถิติ</a>
      </nav>
      <div class="connection-light" id="connectionLight" title="สถานะการเชื่อมต่อ"></div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div><p class="eyebrow">Access Control</p><h1>จัดการสิทธิ์ผู้ใช้</h1></div>
        <div class="top-actions"><button class="ghost-button" data-logout>ออกจากระบบ</button></div>
      </header>
      <section class="workspace">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>ยศ</th><th>หน้าที่เข้าถึงได้</th><th>สถานะ</th><th></th></tr></thead>
            <tbody id="userRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <dialog class="modal" id="permissionModal">
    <section class="modal-card">
      <header class="modal-head">
        <div>
          <p class="eyebrow">Access Pages</p>
          <h2 id="permissionTitle">จัดการสิทธิ์</h2>
        </div>
        <button class="icon-button close" type="button" data-close-permission title="ปิด" aria-label="ปิด"></button>
      </header>
      <input type="hidden" id="permissionUserId">
      <div class="permission-editor" id="permissionEditor"></div>
      <footer class="modal-actions">
        <button class="ghost-button" type="button" data-close-permission>ยกเลิก</button>
        <button class="primary-button" type="button" id="savePermissions">บันทึกสิทธิ์</button>
      </footer>
    </section>
  </dialog>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/site-config.js"></script>
  <script src="assets/app.js?v=20260617-final-check"></script>
</body>
</html>
